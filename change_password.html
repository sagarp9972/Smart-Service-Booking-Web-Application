{% extends 'core/base.html' %}
{% block title %}Change Password — SmartService{% endblock %}
{% block content %}
<div class="container py-5"><div class="row justify-content-center"><div class="col-md-5">
 <div class="card shadow-sm p-4">
  <div class="d-flex align-items-center mb-4">
   <a href="{% url 'profile' %}" class="btn btn-outline-secondary btn-sm me-3">← Back</a>
   <h3 class="fw-bold mb-0">Change Password</h3>
  </div>
  <form method="POST" novalidate>{% csrf_token %}
   {% for f in form %}
   <div class="mb-3"><label class="form-label fw-semibold">{{ f.label }}</label>{{ f }}
    {% if f.errors %}<div class="text-danger small mt-1">{{ f.errors.0 }}</div>{% endif %}
   </div>{% endfor %}
   <button type="submit" class="btn btn-primary w-100 fw-bold"><i class="fas fa-lock me-1"></i>Update Password</button>
  </form>
 </div>
</div></div></div>
{% endblock %}
