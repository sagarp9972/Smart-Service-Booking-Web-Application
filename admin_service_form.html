{% extends 'core/base.html' %}
{% block title %}{{ title }} — Admin{% endblock %}
{% block content %}
<div class="container py-4"><div class="row justify-content-center"><div class="col-md-8">
 <div class="card shadow-sm p-4">
  <div class="d-flex align-items-center mb-4">
   <a href="{% url 'admin_services' %}" class="btn btn-outline-secondary btn-sm me-3">← Back</a>
   <h3 class="fw-bold mb-0">{{ title }}</h3>
  </div>
  <form method="POST" enctype="multipart/form-data" novalidate>{% csrf_token %}
   <div class="row g-3">
    {% for f in form %}
    <div class="col-md-{% if f.name in 'name,price,duration_minutes' %}6{% elif f.name == 'available' %}12{% else %}12{% endif %}">
     <label class="form-label fw-semibold small">{{ f.label }}</label>{{ f }}
     {% if f.errors %}<div class="text-danger small mt-1">{{ f.errors.0 }}</div>{% endif %}
     {% if f.help_text %}<small class="text-muted">{{ f.help_text }}</small>{% endif %}
    </div>{% endfor %}
   </div>
   <div class="d-flex gap-2 mt-4">
    <a href="{% url 'admin_services' %}" class="btn btn-outline-secondary flex-fill">Cancel</a>
    <button type="submit" class="btn btn-primary flex-fill fw-bold"><i class="fas fa-save me-1"></i>Save</button>
   </div>
  </form>
 </div>
</div></div></div>
{% endblock %}
