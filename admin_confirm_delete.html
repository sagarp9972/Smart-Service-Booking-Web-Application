{% extends 'core/base.html' %}
{% block title %}Confirm Delete — Admin{% endblock %}
{% block content %}
<div class="container py-5"><div class="row justify-content-center"><div class="col-md-5">
 <div class="card shadow-sm p-4 text-center">
  <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
  <h4 class="fw-bold">Confirm Delete</h4>
  <p class="text-muted">Are you sure you want to delete this {{ type }}?</p>
  <div class="alert alert-warning fw-bold">{{ object }}</div>
  <p class="text-danger small">⚠️ This action cannot be undone!</p>
  <div class="d-flex gap-2 justify-content-center mt-3">
   <a href="{% url 'admin_services' %}" class="btn btn-outline-secondary px-4">Cancel</a>
   <form method="POST">{% csrf_token %}<button type="submit" class="btn btn-danger px-4"><i class="fas fa-trash me-1"></i>Yes, Delete</button></form>
  </div>
 </div>
</div></div></div>
{% endblock %}
